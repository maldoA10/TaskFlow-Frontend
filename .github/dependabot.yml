version: 2

updates:
  # Frontend - NPM dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

    # Agrupa dependencias de desarrollo en un solo PR
    groups:
      dev-dependencies:
        dependency-type: "development"

      # Agrupa paquetes de Next.js en un solo PR
      nextjs-core:
        patterns:
          - "next"
          - "react"
          - "react-dom"

      # Agrupa actualizaciones menores y parches seguras
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      
      # Agrupa librerías comunes de la comunidad (UI, utilidades)
      ui-and-utils:
        patterns:
          - "lucide-react"
          - "clsx"
          - "tailwind-merge"
          - "@radix-ui/*"

    # Evita actualizaciones major automáticas
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions (CI/CD)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"