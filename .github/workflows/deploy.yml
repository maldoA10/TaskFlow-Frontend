name: CD - Deploy

on:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  # JOB 1: Build para el entorno correspondiente
  build:
    name: Build ${{ github.ref_name == 'main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for ${{ steps.set-env.outputs.environment }}
        run: |
          if [[ "${{ steps.set-env.outputs.environment }}" == "production" ]]; then
            npm run build -- --configuration production
          else
            npm run build -- --configuration staging
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.set-env.outputs.environment }}
          path: dist/
          retention-days: 7

  # JOB 2: Deploy
  deploy:
    name: Deploy to ${{ needs.build.outputs.environment }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ needs.build.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist-${{ needs.build.outputs.environment }}
          path: dist/

      # ── Opción A: Vercel ──────────────────
      # - name: Deploy to Vercel
      #   uses: amondnet/vercel-action@v25
      #   with:
      #     vercel-token: ${{ secrets.VERCEL_TOKEN }}
      #     vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
      #     vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
      #     vercel-args: ${{ needs.build.outputs.environment == 'production' && '--prod' || '' }}

      # ── Opción B: Firebase Hosting ────────
      # - name: Deploy to Firebase
      #   uses: FirebaseExtended/action-hosting-deploy@v0
      #   with:
      #     repoToken: ${{ secrets.GITHUB_TOKEN }}
      #     firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      #     channelId: ${{ needs.build.outputs.environment == 'production' && 'live' || 'staging' }}

      # ── Opción C: AWS S3 + CloudFront ─────
      # - name: Deploy to S3
      #   run: |
      #     aws s3 sync dist/ s3://${{ secrets.S3_BUCKET }} --delete
      #     aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} --paths "/*"
      #   env:
      #     AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy placeholder
        run: echo "Configura el hosting en este step."

  # JOB 3: Notificación de resultado
  notify:
    name: Notify Result
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Deployment status
        run: |
          if [[ "${{ needs.deploy.result }}" == "success" ]]; then
            echo "Deploy exitoso a ${{ needs.build.outputs.environment }}"
          else
            echo "Deploy fallido a ${{ needs.build.outputs.environment }}"
            exit 1
          fi